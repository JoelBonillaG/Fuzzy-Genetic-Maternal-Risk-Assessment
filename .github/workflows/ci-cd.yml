name: CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validar proyecto
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias del backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validar backend
        working-directory: backend
        run: |
          python -m compileall -q src
          python -c "from src.app.main import app; print(app.title)"

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Construir frontend
        working-directory: frontend
        run: npm run build

  deploy:
    name: Desplegar en VPS
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Validar secrets de despliegue
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          test -n "$VPS_HOST" || (echo "Falta configurar el secret VPS_HOST" && exit 1)
          test -n "$VPS_USER" || (echo "Falta configurar el secret VPS_USER" && exit 1)
          test -n "$VPS_SSH_PRIVATE_KEY" || (echo "Falta configurar el secret VPS_SSH_PRIVATE_KEY" && exit 1)
          test -n "$VPS_APP_DIR" || (echo "Falta configurar el secret VPS_APP_DIR" && exit 1)

      - name: Configurar SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Ejecutar despliegue remoto
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_NODE_VERSION: ${{ secrets.VPS_NODE_VERSION }}
          VPS_BACKEND_RESTART_COMMAND: ${{ secrets.VPS_BACKEND_RESTART_COMMAND }}
          VPS_FRONTEND_RESTART_COMMAND: ${{ secrets.VPS_FRONTEND_RESTART_COMMAND }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "APP_DIR='$VPS_APP_DIR' NODE_VERSION='$VPS_NODE_VERSION' BACKEND_RESTART_COMMAND='$VPS_BACKEND_RESTART_COMMAND' FRONTEND_RESTART_COMMAND='$VPS_FRONTEND_RESTART_COMMAND' bash -s" \
            < scripts/deploy-vps.sh
